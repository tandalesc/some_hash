# Default config — sensible baseline for any hardware

[model]
d_model = 256
n_heads = 4
n_layers = 6
dropout = 0.0

[training]
batch_size = 256
lr = 3e-4
weight_decay = 0.01
warmup_steps = 1000
max_steps = 100_000
eval_every = 1000
log_every = 100
save_every = 10_000
checkpoint_dir = "checkpoints"

[diffusion]
sampling_steps = 64

[system]
device = "cuda"
compile = true
compile_mode = "default"
dtype = "bfloat16"
seed = 42
