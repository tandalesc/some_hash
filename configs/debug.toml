# Quick debug run — small batches, few steps, CPU

[model]
d_model = 128
n_heads = 4
n_layers = 2
dropout = 0.0

[training]
batch_size = 32
lr = 3e-4
warmup_steps = 10
max_steps = 100
eval_every = 50
log_every = 10
save_every = 0
checkpoint_dir = "checkpoints/debug"

[diffusion]
sampling_steps = 8

[system]
device = "cpu"
compile = false
dtype = "float32"
seed = 42
