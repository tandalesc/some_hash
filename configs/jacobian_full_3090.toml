# Jacobian network training on 3090 — full features
# STE Jacobian + soft MD5 intermediate state snapshots
# Network sees early-round structure and learns to extrapolate

[model]
d_model = 128
n_heads = 4
n_layers = 4
use_ste_features = true
use_intermediate_features = true
ste_mode = "complex"
n_snapshots = 7

[training]
batch_size = 128
perturbations_per_msg = 8
max_delta = 3
lr = 3e-4
max_steps = 50_000
eval_every = 500
log_every = 50
save_every = 5000
checkpoint_dir = "checkpoints/jacobian/full"

[system]
device = "cuda:1"
compile = true
dtype = "bfloat16"
